<script>
(function () {
 'use strict';

 // Parse ?ids=a,b,c — fall back to localStorage compare list
 let ids = (new URLSearchParams(location.search).get('ids') || '').split(',').filter(Boolean);
 if (!ids.length) {
 try {
 const list = JSON.parse(localStorage.getItem('sunspot_compare') || '[]');
 ids = list.map(v =>v.slug);
 } catch (e) {}
 }

 const out = document.getElementById('cmp-content');
 const title = document.getElementById('cmp-title');

 if (!ids.length) {
 out.innerHTML = '<div class="cmp-empty">' +
 '<h2>Pick two or three venues and compare in under a minute</h2>' +
 '<p>Click the ⇄ button on any venue card to add it to compare. You can add up to 3.</p>' +
 '<p style="margin-top:16px"><a href="index.html" style="background:#ff9800;color:#fff;padding:12px 24px;border-radius:100px;text-decoration:none;font-weight:600">Browse venues →</a></p>' +
 '</div>';
 return;
 }

 const venues = ids.map(id =>(window.SUNSPOT_CLUBS || []).find(v =>v.id === id)).filter(Boolean);
 if (!venues.length) {
 out.innerHTML = '<div class="cmp-empty"><h2>Venues not found</h2><p><a href="index.html">← Browse venues</a></p></div>';
 return;
 }

 title.textContent = 'Compare: ' + venues.map(v =>v.name).join(' vs ');

 // Determine "winner" cell per row (higher is better for some, lower for price)
 function winners(values, dir) {
 if (values.every(v =>v == null || v === '')) return [];
 if (dir === 'high') {
 const max = Math.max.apply(null, values.filter(v =>v != null && !isNaN(v)));
 return values.map(v =>+v === max);
 }
 if (dir === 'low') {
 const min = Math.min.apply(null, values.filter(v =>v != null && !isNaN(v) && +v>0));
 return values.map(v =>+v === min && +v>0);
 }
 return [];
 }

 function arr(x) { return Array.isArray(x) ? x : x ? [x] : []; }
 function bool(x) { return x ? '' : '—'; }

 const rows = [
 { label: 'Category', get: v =>v.regionLabel ? (v.category + ' · ' + v.regionLabel) : v.category },
 { label: 'Region', get: v =>v.region },
 { label: 'Location', get: v =>v.location },
 { label: 'Rating', get: v =>v.rating ? ' ' + v.rating : '—', dir: 'high', num: v =>v.rating || 0 },
 { label: 'Reviews', get: v =>v.reviews ? v.reviews.toLocaleString() : '—', dir: 'high', num: v =>v.reviews || 0 },
 { label: 'Bookable?', get: v =>bool(v.hasBookableSunbeds) },
 { label: 'Sunbed from', get: v =>v.sunbedFrom ? '€' + v.sunbedFrom : (v.hasBookableSunbeds ? '—' : 'Free'), dir: 'low', num: v =>v.sunbedFrom || (v.hasBookableSunbeds ? 999 : 0) },
 { label: 'Cabana from', get: v =>v.cabanaFrom ? '€' + v.cabanaFrom : '—', dir: 'low', num: v =>v.cabanaFrom || 999 },
 { label: 'VIP from', get: v =>v.vipFrom ? '€' + v.vipFrom : '—', dir: 'low', num: v =>v.vipFrom || 999 },
 { label: 'Spots today', get: v =>v.spotsLeft != null ? v.spotsLeft : '—', dir: 'high', num: v =>v.spotsLeft || 0 },
 { label: 'Capacity', get: v =>v.capacity ? (v.capacity.sunbeds || 0) + ' sunbeds · ' + (v.capacity.total || 0) + ' total' : '—', dir: 'high', num: v =>v.capacity?.total || 0 },
 { label: 'Hours', get: v =>v.hours || '—' },
 { label: 'Season', get: v =>v.season || '—' },
 { label: 'Pool type', get: v =>v.poolType || '—' },
 { label: 'Dress code', get: v =>v.dressCode || '—' },
 { label: 'Parking', get: v =>v.parking || '—' },
 { label: 'Vibe / best for', get: v =>arr(v.bestFor).join(' · ') || '—' },
 { label: 'Features', get: v =>arr(v.features).slice(0, 5).join(' · ') || '—' },
 { label: 'Amenities', get: v =>arr(v.amenities).slice(0, 6).join(' · ') || '—' },
 { label: 'Website', get: v =>v.website ? '<a href="' + v.website + '" rel="noopener" target="_blank">visit ↗</a>' : '—' },
 { label: 'Phone', get: v =>v.phone ? '<a href="tel:' + v.phone + '">' + v.phone + '</a>' : '—' },
 ];

 let html = '<table class="cmp-table">';
 // Header row with each venue
 html += '<thead><tr><th></th>';
 venues.forEach(v =>{
 html += '<th class="col-header">';
 html += '<div class="hero" style="background-image:url(\'' + ((v.photos||[])[0] || '') + '\')"></div>';
 html += '<h3>' + v.name + '</h3>';
 html += '<div style="color:#50575e;font-size:12px">' + v.regionLabel + '</div>';
 html += '<a class="view" href="club.html?club=' + v.id + '">View →</a><br>';
 html += '<button class="remove" data-rm="' + v.id + '">remove from compare</button>';
 html += '</th>';
 });
 html += '</tr></thead><tbody>';

 rows.forEach(row =>{
 let winnerFlags = [];
 if (row.dir && row.num) {
 winnerFlags = winners(venues.map(row.num), row.dir);
 }
 html += '<tr><th>' + row.label + '</th>';
 venues.forEach((v, i) =>{
 const val = row.get(v);
 const cls = winnerFlags[i] ? ' class="winner"' : '';
 html += '<td' + cls + '>' + (val == null || val === '' ? '—' : val) + '</td>';
 });
 html += '</tr>';
 });

 html += '</tbody></table>';

 // Empty slot suggestion
 if (venues.length < 3) {
 html += '<div style="display:grid;grid-template-columns:1fr;gap:10px;margin:14px 0">' +
 '<div class="add-slot">+ <a href="index.html">Add another venue to compare</a>(you can pick up to 3 in total)</div>' +
 '</div>';
 }

 out.innerHTML = html;

 // Remove handler — drops from localStorage and rebuilds URL
 out.querySelectorAll('[data-rm]').forEach(btn =>btn.addEventListener('click', () =>{
 const id = btn.dataset.rm;
 try {
 const list = JSON.parse(localStorage.getItem('sunspot_compare') || '[]').filter(v =>v.slug !== id);
 localStorage.setItem('sunspot_compare', JSON.stringify(list));
 } catch (e) {}
 const remaining = ids.filter(x =>x !== id);
 location.href = remaining.length ? 'compare.html?ids=' + remaining.join(',') : 'compare.html';
 }));
})();
</script>
