<main class="container">
<ol class="checkout-stepper" aria-label="Checkout progress">
<li class="done">Pick spots</li>
<li class="active">Your details</li>
<li>Payment</li>
<li>Confirmation</li>
</ol>

<div class="checkout-layout">
<form class="checkout-form" id="checkout-form">
<h1>Your details</h1>
<div class="form-row">
<label>First name <input type="text" id="first-name" required value="Mark"></label>
<label>Last name <input type="text" id="last-name" required value="Russo"></label>
</div>
<label>Email <input type="email" id="email" required value="markrusso8@gmail.com"></label>
<label>Phone <input type="tel" id="phone" required value="+356 9999 9999" placeholder="+356"></label>
<label class="checkbox">
<input type="checkbox" id="updates" checked>Send me availability alerts &amp; offers (you can unsubscribe anytime)
</label>

<h2>Payment</h2>
<p class="form-hint">This is a demo. No real payment is processed.</p>
<label>Cardholder name <input type="text" id="card-name" value="Mark Russo"></label>
<label>Card number <input type="text" id="card-number" value="4242 4242 4242 4242" maxlength="19"></label>
<div class="form-row">
<label>Expiry <input type="text" id="card-expiry" value="12/27" maxlength="5"></label>
<label>CVC <input type="text" id="card-cvc" value="123" maxlength="4"></label>
</div>

<label class="checkbox">
<input type="checkbox" id="terms" required>I agree to Sunspot's <a href="faq.html#tos">terms</a> and the operator's beach rules.
</label>

<button type="submit" class="btn-primary" id="pay-btn">Pay &amp; confirm</button>
</form>

<aside class="checkout-summary" id="checkout-summary">
<p>Loading…</p>
</aside>
</div>
</main>
