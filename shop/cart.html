<!DOCTYPE html>
<html lang="en-MT">
<head>
<meta charset="UTF-8">
<script src="../gate.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Sunspot Shop</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="shop.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='13' fill='%23ff9800'/%3E%3C/svg%3E">
</head>
<body>

<header class="shop-header">
<div class="container">
<a href="index.html" class="shop-brand">
<span class="shop-brand-mark"></span>
<span>Sunspot <small>Shop</small></span>
</a>
<nav class="shop-nav">
<a href="index.html">Shop</a>
<a href="../index.html">Beaches</a>
<a href="../experiences.html">Experiences</a>
<a href="cart.html" class="cart" id="cart-link">
<span id="cart-icon"></span>Cart <span class="cart-count" id="cart-count">0</span>
</a>
</nav>
</div>
</header>

<main class="container" id="main-content">
<h1 style="padding:32px 0 8px">Cart</h1>
<p style="color:#50575e;margin-bottom:20px"><span id="line-count">0</span> items</p>

<div id="cart-body"></div>
</main>

<footer class="shop-footer">
<div class="container">
<div class="links">
<a href="index.html">Continue shopping</a>
<a href="../faq.html">FAQ</a>
<a href="../about.html">About</a>
</div>
<div>© 2026 Sunspot Ltd.</div>
</div>
</footer>

<script src="../icons.js"></script>
<script src="../features.js"></script>
<script src="../audiences.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script>
(function () {
 'use strict';
 document.getElementById('cart-icon').innerHTML = SS_ICONS.bag(15);

 function render() {
 const items = SunspotCart.read();
 document.getElementById('line-count').textContent = items.length;

 if (!items.length) {
 document.getElementById('cart-body').innerHTML =
 '<div class="cart-empty">' +
 '<h2>Your cart is empty</h2>' +
 '<p style="margin:8px 0 20px">No essentials saved yet. Have a look at what we sell.</p>' +
 '<a href="index.html" style="background:#ff9800;color:#fff;padding:12px 24px;border-radius:100px;text-decoration:none;font-weight:700">Browse the shop</a>' +
 '</div>';
 return;
 }

 const sub = SunspotCart.subtotal();
 const shipping = sub>= 40 ? 0 : 4.5;
 const total = sub + shipping;

 document.getElementById('cart-body').innerHTML =
 '<div class="cart-layout">' +
 '<div>' +
 items.map((i, idx) =>{
 return '<div class="cart-line">' +
 '<img src="' + i.photo + '" alt="">' +
 '<div>' +
 '<h3>' + i.name + '</h3>' +
 '<div class="variant">' +
 (i.color ? i.color + (i.size ? ' · ' : '') : '') +
 (i.size ? 'Size ' + i.size : '') +
 ((!i.color && !i.size) ? 'One size' : '') +
 '</div>' +
 '<div class="qty">' +
 '<button data-q-minus="' + idx + '">−</button>' +
 '<span style="padding:0 10px;font-weight:700">' + i.qty + '</span>' +
 '<button data-q-plus="' + idx + '">+</button>' +
 '</div>' +
 '</div>' +
 '<div style="text-align:right">' +
 '<div class="price">€' + (i.price * i.qty) + '</div>' +
 '<button class="remove" data-remove="' + idx + '">Remove</button>' +
 '</div>' +
 '</div>';
 }).join('') +
 '</div>' +
 '<aside class="cart-summary">' +
 '<h2>Summary</h2>' +
 '<div class="row"><span>Subtotal</span><span>€' + sub.toFixed(2) + '</span></div>' +
 '<div class="row"><span>Shipping (Malta)</span><span>' + (shipping === 0 ? 'Free' : '€' + shipping.toFixed(2)) + '</span></div>' +
 (sub < 40 ? '<p style="font-size:12px;color:#50575e;margin-top:8px">Add €' + (40 - sub).toFixed(2) + ' more for free shipping</p>' : '') +
 '<div class="row total"><span>Total</span><span>€' + total.toFixed(2) + '</span></div>' +
 '<button class="checkout" id="checkout">Checkout</button>' +
 '<p style="font-size:12px;color:#50575e;text-align:center;margin-top:12px">Secure checkout · Card · Apple Pay · Google Pay</p>' +
 '</aside>' +
 '</div>';

 document.querySelectorAll('[data-q-plus]').forEach(b =>b.addEventListener('click', () =>{
 const idx = +b.dataset.qPlus;
 const items = SunspotCart.read();
 SunspotCart.setQty(idx, items[idx].qty + 1);
 render();
 }));
 document.querySelectorAll('[data-q-minus]').forEach(b =>b.addEventListener('click', () =>{
 const idx = +b.dataset.qMinus;
 const items = SunspotCart.read();
 SunspotCart.setQty(idx, items[idx].qty - 1);
 render();
 }));
 document.querySelectorAll('[data-remove]').forEach(b =>b.addEventListener('click', () =>{
 SunspotCart.remove(+b.dataset.remove);
 render();
 }));
 document.getElementById('checkout').addEventListener('click', () =>{
 alert('Demo: Stripe checkout would open here.\n\nTotal: €' + total.toFixed(2) + '\nItems: ' + items.reduce((s, i) =>s + i.qty, 0));
 });
 }

 render();
})();
</script>
</body>
</html>
