<style>
  .ch { max-width: 1100px; margin: 0 auto; padding: 32px 24px 100px; color: var(--ink); }

  /* Hero */
  .ch-hero { position: relative; aspect-ratio: 16/8; max-height: 520px;
    border-radius: 18px; overflow: hidden; background: var(--sea-pale); margin-bottom: 32px; }
  .ch-hero img { width: 100%; height: 100%; object-fit: cover; }
  .ch-hero::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(10,31,58,.7)); pointer-events: none; }
  .ch-hero-cap { position: absolute; left: 28px; right: 28px; bottom: 24px; color: #fff; }
  .ch-hero-cap .eyebrow {
    display: inline-block; padding: 5px 12px; border-radius: 999px;
    background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
    font: 700 10.5px/1 var(--font-body); letter-spacing: 2.4px; text-transform: uppercase;
  }
  .ch-hero-cap h1 {
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(2rem, 4.4vw, 3rem); line-height: 1.05;
    letter-spacing: -0.024em; margin: 12px 0 0; max-width: 24ch;
    font-variation-settings: 'opsz' 60, 'SOFT' 30;
  }

  /* Layout */
  .ch-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 40px; }
  @media (max-width: 960px) { .ch-layout { grid-template-columns: 1fr; } }

  .ch-section { margin: 0 0 36px; }
  .ch-section h2 {
    font-family: var(--font-display); font-weight: 500;
    font-size: 26px; letter-spacing: -0.018em;
    margin: 0 0 18px; color: var(--ink);
    font-variation-settings: 'opsz' 48, 'SOFT' 30;
  }
  .ch-lede { font-size: 17px; line-height: 1.65; color: var(--ink-soft); margin: 0 0 16px; }

  /* Spec card */
  .ch-spec {
    background: #fafaf6; border: 1px solid var(--line); border-radius: 14px;
    padding: 22px;
  }
  .ch-spec h3 {
    font: 600 11px/1.4 var(--font-body); letter-spacing: .2em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 14px;
  }
  .ch-spec dl { display: grid; grid-template-columns: 1fr auto; gap: 10px 16px; margin: 0; }
  .ch-spec dt { color: var(--muted); font-size: 13.5px; }
  .ch-spec dd { color: var(--ink); font-weight: 600; font-size: 13.5px; text-align: right; margin: 0;
    font-feature-settings: 'tnum' 1; }

  /* Itinerary timeline */
  .ch-itin { list-style: none; padding: 0; margin: 0;
    border-left: 1px solid var(--line); }
  .ch-itin-step { position: relative; padding: 0 0 24px 28px; }
  .ch-itin-step:last-child { padding-bottom: 0; }
  .ch-itin-step::before {
    content: ""; position: absolute; left: -5px; top: 6px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--honey);
    box-shadow: 0 0 0 3px #fff, 0 0 0 4px var(--line);
  }
  .ch-itin-time {
    display: inline-block; font: 600 11px/1 var(--font-body);
    letter-spacing: .14em; text-transform: uppercase; color: var(--honey);
    margin-bottom: 6px;
  }
  .ch-itin-step h4 {
    font-family: var(--font-display); font-weight: 500; font-size: 17px;
    color: var(--ink); margin: 0 0 4px; letter-spacing: -0.012em;
  }
  .ch-itin-step p { color: var(--ink-soft); font-size: 14.5px; line-height: 1.6; margin: 0; }

  /* Includes/Not included list */
  .ch-list { list-style: none; padding: 0; margin: 0;
    display: grid; gap: 10px; }
  .ch-list li {
    font-size: 14.5px; color: var(--ink-soft); line-height: 1.55;
    padding-left: 26px; position: relative;
  }
  .ch-list.included li::before {
    content: "✓"; position: absolute; left: 0; top: 0;
    color: var(--balcony-green); font-weight: 700;
  }
  .ch-list.excluded li::before {
    content: "—"; position: absolute; left: 0; top: 0;
    color: var(--terracotta); font-weight: 700;
  }

  /* FAQ */
  .ch-faq details {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden;
  }
  .ch-faq summary {
    padding: 16px 20px; cursor: pointer; list-style: none;
    font: 600 14.5px/1.45 var(--font-body); color: var(--ink);
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
  }
  .ch-faq summary::-webkit-details-marker { display: none; }
  .ch-faq summary::after { content: "+"; color: var(--honey); font-size: 22px; font-weight: 400;
    line-height: 1; transition: transform .2s ease; }
  .ch-faq details[open] summary::after { transform: rotate(45deg); }
  .ch-faq details p { padding: 0 20px 18px; color: var(--ink-soft); font-size: 14px; line-height: 1.65; margin: 0; }

  /* Booking card */
  .ch-book {
    position: sticky; top: 90px;
    background: #fff; border: 1px solid var(--line); border-radius: 18px;
    padding: 28px 26px; box-shadow: 0 1px 3px rgba(10,31,58,.04);
  }
  .ch-book .price-from { font: 600 11px/1 var(--font-body); letter-spacing: .18em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 6px; }
  .ch-book .price {
    font-family: var(--font-display); font-weight: 500; font-size: 44px; line-height: 1;
    color: var(--ink); letter-spacing: -0.022em;
    font-variation-settings: 'opsz' 60, 'SOFT' 30;
    font-feature-settings: 'tnum' 1;
  }
  .ch-book .price small { font-size: 14px; color: var(--muted); font-weight: 400;
    margin-left: 6px; font-family: var(--font-body); }
  .ch-book .meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; margin: 22px 0;
    padding-top: 18px; border-top: 1px solid var(--line);
  }
  .ch-book .meta div { font-size: 12.5px; color: var(--muted); }
  .ch-book .meta strong { display: block; color: var(--ink); font-size: 14.5px; margin-top: 2px; }
  .ch-book a.cta {
    display: block; width: 100%; text-align: center;
    background: var(--grad-sun); color: #fff;
    padding: 14px 22px; border-radius: 999px;
    text-decoration: none; font: 600 14.5px/1 var(--font-body); letter-spacing: .01em;
    box-shadow: 0 8px 22px rgba(245,124,0,.30);
  }
  .ch-book a.cta:hover { transform: translateY(-1px); }
  .ch-book .terms { font-size: 12px; color: var(--muted); line-height: 1.55; margin: 14px 0 0; }
  .ch-book .terms a { color: var(--sun-deep); }

  .ch-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 13.5px;
    margin: 0 0 14px;
  }
  .ch-back:hover { color: var(--ink); }
</style>
