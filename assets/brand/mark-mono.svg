<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sunspot — single-colour mark.
  Use on dark photo overlays, print, embroidery, partner badges.
  Default fill is currentColor so it inherits the surrounding text colour.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="Sunspot">
  <title>Sunspot</title>
  <g fill="currentColor">
    <g opacity="0.5">
      <rect x="19" y="2"  width="2" height="4" rx="1"/>
      <rect x="19" y="34" width="2" height="4" rx="1"/>
      <rect x="2"  y="19" width="4" height="2" rx="1"/>
      <rect x="34" y="19" width="4" height="2" rx="1"/>
      <rect x="6.5" y="6.5" width="4.5" height="2" rx="1" transform="rotate(45 8.75 7.5)"/>
      <rect x="29"  y="29"  width="4.5" height="2" rx="1" transform="rotate(45 31.25 30)"/>
      <rect x="29"  y="6.5" width="4.5" height="2" rx="1" transform="rotate(-45 31.25 7.5)"/>
      <rect x="6.5" y="29"  width="4.5" height="2" rx="1" transform="rotate(-45 8.75 30)"/>
    </g>
    <circle cx="20" cy="20" r="11"/>
    <circle cx="24" cy="16" r="3" fill="#fff" opacity="0.55"/>
  </g>
</svg>
