<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sunspot — primary brand mark.
  40×40 grid. Three concentric circles + 8 sun rays + an asymmetric
  highlight at the 2 o'clock position. The highlight is what makes
  this distinct from generic "sun icons" — it reads as a sun catching
  reflected water at 35° on the Maltese coast.

  Animatable: the inner ring (#mark-inner) pulses subtly via the
  .ss-brand-mark-anim CSS keyframe.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="Sunspot">
  <title>Sunspot</title>
  <g id="mark-rays" stroke="#ff9800" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="20" y1="2"  x2="20" y2="6"/>
    <line x1="20" y1="34" x2="20" y2="38"/>
    <line x1="2"  y1="20" x2="6"  y2="20"/>
    <line x1="34" y1="20" x2="38" y2="20"/>
    <line x1="7"  y1="7"  x2="10" y2="10"/>
    <line x1="30" y1="30" x2="33" y2="33"/>
    <line x1="33" y1="7"  x2="30" y2="10"/>
    <line x1="10" y1="30" x2="7"  y2="33"/>
  </g>
  <circle id="mark-outer" cx="20" cy="20" r="11" fill="#ff9800"/>
  <circle id="mark-inner" cx="20" cy="20" r="9"  fill="#ffb74d"/>
  <circle id="mark-glint" cx="24" cy="16" r="3"  fill="#fff5e1"/>
</svg>
