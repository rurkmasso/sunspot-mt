<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sunspot — lockup in single-colour (light on dark).
  For dark backgrounds: navy hero overlays, dark mode header, signage.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="Sunspot">
  <title>Sunspot</title>
  <style>
    .lockup-wm-light {
      font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif;
      font-weight: 600;
      font-size: 36px;
      letter-spacing: -0.8px;
      font-variation-settings: 'opsz' 36, 'SOFT' 30;
    }
  </style>
  <g transform="translate(0,8)" fill="#fff">
    <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.55">
      <line x1="20" y1="2"  x2="20" y2="6"/>
      <line x1="20" y1="34" x2="20" y2="38"/>
      <line x1="2"  y1="20" x2="6"  y2="20"/>
      <line x1="34" y1="20" x2="38" y2="20"/>
      <line x1="7"  y1="7"  x2="10" y2="10"/>
      <line x1="30" y1="30" x2="33" y2="33"/>
      <line x1="33" y1="7"  x2="30" y2="10"/>
      <line x1="10" y1="30" x2="7"  y2="33"/>
    </g>
    <circle cx="20" cy="20" r="11" fill="#fff"/>
    <circle cx="24" cy="16" r="3"  fill="#0a1f3a" opacity="0.85"/>
  </g>
  <text x="56" y="41" class="lockup-wm-light" fill="#fff">Sunspot</text>
</svg>
